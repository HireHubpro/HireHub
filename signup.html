<!doctype html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Sign Up</title><link rel="stylesheet" href="css/styles.css"></head>
<body><main class="app"><div class="h2">Create your account</div><div id="selectedRole" class="tag"></div><form id="signupForm" class="form"><input name="fullName" placeholder="Full name" required><input name="email" type="email" placeholder="Email" required><input name="password" type="password" placeholder="Create a password" minlength="6" required><button class="btn btn-primary" type="submit">Create Account</button></form><div id="authError" class="error"></div></main><script src="js/store.js"></script><script src="js/app.js"></script></body></html>
