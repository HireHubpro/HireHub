<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Choose Role</title>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <main class="phone">
      <h2>Choose how you want to join HireHub</h2>
      <div class="role-list">
        <div class="card role-card" data-role="applicant">
          <div>
            <div class="role-title">Join as Applicant</div>
            <div class="role-desc">Find opportunities and grow your career.</div>
          </div>
          <div class="arrow">›</div>
        </div>

        <div class="card role-card" data-role="hirer">
          <div>
            <div class="role-title">Join as Hirer</div>
            <div class="role-desc">Post jobs, find talent, and build your team.</div>
          </div>
          <div class="arrow">›</div>
        </div>
      </div>
      <a href="login.html" class="link">Already have an account? Log in</a>
    </main>
    <script src="config.js"></script>
    <script src="js/store.js"></script>
    <script src="js/auth.js"></script>
  </body>
</html>
