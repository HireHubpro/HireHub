<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HireHub | Choose Role</title>
    <link rel="stylesheet" href="/css/styles.css" />
  </head>
  <body>
    <main class="phone screen">
      <div class="top-time">9:41</div>
      <a href="/index.html" class="back-btn" aria-label="Go back">←</a>
      <h2 class="screen-title">Choose how you want to join HireHub</h2>

      <div class="card role-card selected" data-role="applicant">
        <div class="role-icon applicant">◯</div>
        <div>
          <h3>Join as Applicant</h3>
          <p>Find opportunities and grow your career.</p>
        </div>
        <span class="arrow">›</span>
      </div>

      <div class="card role-card" data-role="hirer">
        <div class="role-icon hirer">▢</div>
        <div>
          <h3>Join as Hirer</h3>
          <p>Post jobs, find talent and build your team.</p>
        </div>
        <span class="arrow">›</span>
      </div>

      <a href="/login.html" class="link login-link">Already have an account? <strong>Log in</strong></a>
    </main>
    <script src="/js/auth.js"></script>
  </body>
</html>
