<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HireHub - Home</title>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <main class="mobile-screen">
      <div class="status-bar" style="padding:12px 16px 2px"><span>9:41</span><span class="status-icons">◉ ◖ ▮</span></div>

      <header class="topbar">
        <div class="brand-compact">
          <svg class="icon-solid" viewBox="0 0 24 24" style="color:#155eef"><path d="M5 4a3 3 0 1 0 0 6 3 3 0 0 0 0-6Zm14 0a3 3 0 1 0 0 6 3 3 0 0 0 0-6ZM3 13a3 3 0 0 1 3-3h2a3 3 0 0 1 3 3v7H6a3 3 0 0 1-3-3v-4Zm10 0a3 3 0 0 1 3-3h2a3 3 0 0 1 3 3v4a3 3 0 0 1-3 3h-5v-7Z"/></svg>
          Hire<span style="color:#155eef">Hub</span>
        </div>
        <div class="top-actions">
          <button class="icon-btn"><svg class="icon" viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg></button>
          <button class="icon-btn"><svg class="icon" viewBox="0 0 24 24"><path d="M15 17h5l-1.4-1.4A2 2 0 0 1 18 14.2V11a6 6 0 1 0-12 0v3.2a2 2 0 0 1-.6 1.4L4 17h5"></path><path d="M9 17a3 3 0 0 0 6 0"></path></svg></button>
        </div>
      </header>

      <section class="card composer">
        <div class="composer-head">
          <div id="composerAvatar" class="avatar">U</div>
          <input id="postInput" placeholder="Share a text post..." />
        </div>
        <div class="composer-actions">
          <div class="composer-btn" id="postTextBtn"><span style="color:#155eef">▣</span>Text Post</div>
          <div class="composer-btn"><span style="color:#16a34a">▣</span>Job</div>
          <div class="composer-btn"><span style="color:#f59e0b">▣</span>Article</div>
        </div>
      </section>

      <section id="feedPosts" class="feed"></section>

      <nav class="bottom-nav">
        <button class="active"><span>⌂</span><span>Home</span></button>
        <button id="addPostBtn"><span>＋</span><span>Post</span></button>
        <button><span>✉</span><span>Inbox</span></button>
        <button id="profileBtn"><span>◯</span><span>Profile</span></button>
      </nav>
    </main>

    <aside id="profilePanel" class="profile-panel">
      <div class="status-bar" style="padding:10px 16px 0;"><span>9:41</span><span class="status-icons">◉ ◖ ▮</span></div>
      <div class="cover">
        <button class="panel-camera-btn">📷</button>
      </div>
      <div class="panel-section">
        <div style="display:flex; justify-content:flex-end; margin-top:-122px; position:relative; z-index:2;"><button id="closePanel" class="icon-btn" style="color:#fff">✕</button></div>
        <div class="profile-head">
          <div class="avatar-shell">
            <div id="panelAvatar" class="profile-avatar">U</div>
            <button class="avatar-camera-btn">📷</button>
          </div>
          <div>
            <div style="display:flex; align-items:center; gap:8px;"><h2 id="panelName" style="margin:0; font-size:34px;">User</h2><span id="panelRole" class="badge">Applicant</span></div>
            <p id="panelHeadline" style="margin:4px 0 0; color:#475467;">Product Designer</p>
            <p id="panelLocation" style="margin:4px 0 0; color:#475467;">Bengaluru, India</p>
          </div>
        </div>

        <div class="section-head">
          <span>About Myself</span>
          <button type="button" class="link edit-toggle" data-section="about">Edit</button>
        </div>
        <div class="card profile-card">
          <p id="aboutPreview" class="about-preview"></p>
          <textarea id="aboutInput" class="edit-field" rows="4" placeholder="Tell people about yourself"></textarea>
          <div class="inline-input edit-field-row">
            <input id="headlineInput" class="edit-field" placeholder="Headline" />
            <input id="locationInput" class="edit-field" placeholder="Location" />
          </div>
          <button id="saveProfile" class="btn btn-primary" style="height:44px; font-size:16px; margin-top:10px;">Save Profile</button>
        </div>

        <div class="section-head"><span>Resume</span><button type="button" class="link">Edit</button></div>
        <div class="card profile-card"><div class="resume-row"><div><strong>Rohit_Sharma_Resume.pdf</strong><div class="tiny">PDF · 650 KB</div></div><span>⇩</span></div></div>

        <div class="section-head"><span>Experience</span></div>
        <div class="card profile-card">
          <div class="inline-input"><input id="experienceInput" placeholder="Add experience" /><button id="addExperienceBtn" class="btn btn-ghost" style="height:44px; font-size:14px; width:92px;">Add</button></div>
          <div id="experiencePills" class="stack" style="margin-top:8px;"></div>
        </div>

        <div class="section-head"><span>Education</span></div>
        <div class="card profile-card">
          <div class="inline-input"><input id="educationInput" placeholder="Add education" /><button id="addEducationBtn" class="btn btn-ghost" style="height:44px; font-size:14px; width:92px;">Add</button></div>
          <div id="educationPills" class="stack" style="margin-top:8px;"></div>
        </div>

        <div class="section-head"><span>Skills</span></div>
        <div class="card profile-card">
          <div class="inline-input"><input id="skillsInput" placeholder="Add skill" /><button id="addSkillsBtn" class="btn btn-ghost" style="height:44px; font-size:14px; width:92px;">Add</button></div>
          <div id="skillsPills" class="stack" style="margin-top:8px;"></div>
        </div>

        <div class="section-head"><span>Edit My Posts</span></div>
        <div class="card profile-card" id="profilePosts"></div>
      </div>
    </aside>

    <div id="backdrop" class="backdrop"></div>

    <script src="js/store.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
