<!doctype html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Home</title><link rel="stylesheet" href="css/styles.css"></head>
<body><main class="app"><div class="topbar"><div class="logo-mini">HireHub</div><div class="icons"><button class="icon">💬</button><button class="icon">🔔</button></div></div><div class="card composer"><div class="composer-input">What's on your mind?</div><div class="composer-actions"><span>📝 Post</span><span>💼 Job</span><span>📄 Article</span></div></div><section class="feed"><article class="card"><div class="post-head"><strong id="welcomeName">User</strong><span id="roleText"></span></div><div class="post-title">Excited to share my latest UI/UX progress</div><div class="post-body">Let me know your thoughts on this updated onboarding flow and profile experience.</div></article></section><aside id="profilePanel" class="panel"><div class="cover"></div><div class="panel-head"><strong>Profile</strong><button id="closePanel" class="icon">✕</button></div><div class="panel-body"><div class="row"><strong id="panelName"></strong><span id="panelRole" class="tag"></span></div><div id="panelHeadline"></div><div id="panelLocation" class="sub" style="margin:0"></div><div class="card"><div class="row"><strong>About</strong></div><textarea id="aboutInput" rows="4"></textarea></div><div class="card"><label>Headline</label><input id="headlineInput"><label>Location</label><input id="locationInput"></div><button id="saveProfile" class="btn btn-primary">Save Profile</button></div></aside><div id="backdrop" class="backdrop"></div><nav class="bottom-nav"><button class="active">Home</button><button>Post</button><button>Inbox</button><button id="profileBtn">Profile</button></nav></main><script src="js/store.js"></script><script src="js/app.js"></script></body></html>
