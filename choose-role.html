<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HireHub - Choose Role</title>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <main class="mobile-screen">
      <section class="screen-content">
        <div class="status-bar"><span>9:41</span><span class="status-icons">◉ ◖ ▮</span></div>
        <div class="nav-top"><button onclick="history.back()" class="icon-btn">←</button></div>
        <h1>Choose how you want to join HireHub</h1>

        <div class="stack">
          <div class="card role-card" data-role="applicant">
            <div class="role-info">
              <span class="role-badge applicant">
                <svg class="icon" viewBox="0 0 24 24"><path d="M20 21a8 8 0 0 0-16 0"></path><circle cx="12" cy="7" r="4"></circle></svg>
              </span>
              <div>
                <p class="role-title">Join as Applicant</p>
                <p class="role-desc">Find opportunities and grow your career.</p>
              </div>
            </div>
            <span>›</span>
          </div>

          <div class="card role-card" data-role="hirer">
            <div class="role-info">
              <span class="role-badge hirer">
                <svg class="icon" viewBox="0 0 24 24"><rect x="3" y="7" width="18" height="13" rx="2"></rect><path d="M8 7V5a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
              </span>
              <div>
                <p class="role-title">Join as Hirer</p>
                <p class="role-desc">Post jobs, find talent and build your team.</p>
              </div>
            </div>
            <span>›</span>
          </div>
        </div>

        <p class="subtitle" style="text-align:center; margin-top:42px; font-size:16px;">Already have an account? <a class="link" href="login.html">Log in</a></p>
      </section>
    </main>
    <script src="js/store.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
