<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HireHub - Choose Role</title>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <main class="screen">
      <h1 class="h1">Choose how you want to join HireHub</h1>
      <div class="stack">
        <div class="card role-card" data-role="applicant">
          <div>
            <div class="role-title">👤 Join as Applicant</div>
            <div class="role-desc">Find opportunities and grow your career.</div>
          </div>
          <div class="arrow">›</div>
        </div>
        <div class="card role-card" data-role="hirer">
          <div>
            <div class="role-title">💼 Join as Hirer</div>
            <div class="role-desc">Post jobs, find talent, and build your team.</div>
          </div>
          <div class="arrow">›</div>
        </div>
      </div>
      <a class="link" href="login.html">Already have an account? Log in</a>
    </main>
    <script src="js/store.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
